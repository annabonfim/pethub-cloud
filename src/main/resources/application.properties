spring.application.name=pethub

# RSA Keys
rsa.private-key=classpath:certs/private_key.pem
rsa.public-key=classpath:certs/public_key.pem

# Azure SQL Server
spring.datasource.url=jdbc:sqlserver://SEU_SERVER.database.windows.net:1433;database=pethub;encrypt=true;trustServerCertificate=false;loginTimeout=30
spring.datasource.username=SEU_USUARIO
spring.datasource.password=SUA_SENHA
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Flyway
spring.flyway.baseline-on-migrate=true

# Application Insights
azure.application-insights.instrumentation-key=SUA_INSTRUMENTATION_KEY